# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '20'  # Adjust to your project's Node.js version
          cache: 'npm'  # Cache npm dependencies to speed up builds

      - name: Debug - Check repository contents
        run: ls -la
        shell: bash

      - name: Install dependencies
        run: npm install
        shell: bash

      - name: Debug - Check package.json
        run: cat package.json
        shell: bash

      - name: Build project
        run: npm run build
        shell: bash
        env:
          NODE_ENV: production

      - name: Debug - Check build output
        run: ls -la ./dist
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'  # Adjust to your build output folder (e.g., 'build', 'public')

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
