# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4.0.3
        with:
          node-version: '18'  # เปลี่ยนเป็น 18 เพื่อความเข้ากันได้
          cache: 'npm'  # Cache dependencies เพื่อความเร็ว

      - name: Debug - Check repository contents
        run: ls -la
        shell: bash

      - name: Debug - Check package.json
        run: |
          if [ -f package.json ]; then
            cat package.json
          else
            echo "Error: package.json not found"
            exit 1
          fi
        shell: bash

      - name: Install dependencies
        run: npm install
        shell: bash

      - name: Debug - Check node_modules
        run: ls -la node_modules || echo "node_modules not found"
        shell: bash

      - name: Build project
        run: |
          if npm run build; then
            echo "Build succeeded"
          else
            echo "Build failed"
            exit 1
          fi
        shell: bash
        env:
          NODE_ENV: production

      - name: Debug - Check build output
        run: ls -la public || echo "public folder not found"
        shell: bash

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'  # เปลี่ยนเป็น public เพราะ index.html อยู่ในนี้

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
